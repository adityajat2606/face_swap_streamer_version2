# Test-set manifest (CLAUDE.md §5.3). One entry per PRD §36 test set.
# Clips are NOT committed (gitignored); paths are placeholders the product
# owner fills in with consented, licensed footage. `internal_only` marks clips
# not licensed for redistribution.
#
# Until real clips exist, this documents the five required sets so
# `measure_baseline` emits a complete schema (§5.6 gate).

test_set_1_slow_romantic:
